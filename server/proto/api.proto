syntax = "proto3";

option go_package = "pkg/api";

service Api {
  rpc Compile(CompileRequest) returns (CompileResponse);
  rpc Reflect(ReflectRequest) returns (ReflectResponse);
  rpc OpenApp(OpenAppRequest) returns (OpenAppResponse);
  rpc GetConfiguration(GetConfigurationRequest) returns (GetConfigurationResponse);
  rpc UpdateConfiguration(UpdateConfigurationRequest) returns (UpdateConfigurationResponse);
}

message CompileRequest {
  string id = 1;
  int32 log_offset = 2;
  string proto_dir = 3;
}

message ReflectRequest {
  string url = 1;  // Target gRPC server URL for reflection discovery
}

message ReflectResponse {
  ReflectStatus status = 1;
  repeated Log logs = 2;
  string proto_dir = 3;  // Temp directory containing discovered proto files (only set on success)
}

enum ReflectStatus {
  REFLECT_STATUS_UNKNOWN = 0;
  REFLECT_STATUS_OK = 1;
  REFLECT_STATUS_ERROR = 2;
}

// OpenApp instantiates a built-in app (e.g. the OpenAPI app) from its creation
// parameters. The app generates proto files describing its services/methods and
// returns the temp directory they live in, ready to feed into Compile - the same
// way Reflect works for gRPC reflection. The returned target is used as the
// project URL so method calls are routed back to the app for invocation.
message OpenAppRequest {
  string type = 1;  // Built-in app type, e.g. "openapi"
  map<string, string> parameters = 2;  // App-specific creation parameters, e.g. {"spec_url": "..."}
}

message OpenAppResponse {
  ReflectStatus status = 1;
  repeated Log logs = 2;
  string proto_dir = 3;  // Temp directory containing generated proto files (only set on success)
  string target = 4;  // Invocation target for the app instance, e.g. "kaja-app://<id>" (only set on success)
}

message CompileResponse {
  CompileStatus status = 1;
  repeated Log logs = 2;
  repeated Source sources = 3;
  string stub = 4;
}

enum CompileStatus {
  STATUS_UNKNOWN = 0;
  STATUS_READY = 1;
  STATUS_ERROR = 2;
  STATUS_RUNNING = 3;
}

message Log {
  LogLevel level = 1;
  string message = 2;
}

enum LogLevel {
  LEVEL_DEBUG = 0;
  LEVEL_INFO = 1;
  LEVEL_WARN = 2;
  LEVEL_ERROR = 3;
}

enum RpcProtocol {
  RPC_PROTOCOL_UNSPECIFIED = 0;
  RPC_PROTOCOL_GRPC = 1;
  RPC_PROTOCOL_TWIRP = 2;
}

message Source {
  string path = 1;
  string content = 2;
}

message GetConfigurationRequest {}

message GetConfigurationResponse {
  Configuration configuration = 1;
  repeated Log logs = 2;
}

message Configuration {
  // kaja can be deployed at a subpath - i.e. kaja.tools/demo
	// This field is used to set the subpath.
	// The server uses it to generate the correct paths in HTML and redirects.
	// The JS code is using relative paths and should be not dependent on this.
  string path_prefix = 1;
  repeated ConfigurationProject projects = 2;
  // System-level settings (read-only, ignored in UpdateConfiguration)
  ConfigurationSystem system = 4;
  // Apps are an alternative to projects: instead of pointing at a gRPC/Twirp
  // service, an app is a built-in (or, later, remote) integration that exposes
  // a proto surface kaja renders and invokes the same way as a project.
  repeated ConfigurationApp apps = 5;
}

message ConfigurationSystem {
  // Whether the UI can update configuration (true in desktop app, false in web server)
  bool can_update_configuration = 1;
  // Git commit hash or tag for the currently running version
  string git_ref = 2;
}

message ConfigurationProject {
  string name = 1;
  RpcProtocol protocol = 2;
  string url = 3;
  string proto_dir = 4;
  bool use_reflection = 5;
  map<string, string> headers = 6;
}

message ConfigurationApp {
  string name = 1;
  // Built-in app type. Currently only "openapi" is supported.
  string type = 2;
  // App-specific creation parameters. For "openapi": {"spec_url": "<url>"}.
  map<string, string> parameters = 3;
  // Headers sent with each request the app makes to the upstream service.
  map<string, string> headers = 4;
}

message UpdateConfigurationRequest {
  Configuration configuration = 1;
}

message UpdateConfigurationResponse {
  Configuration configuration = 1;
}